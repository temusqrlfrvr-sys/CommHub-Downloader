<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Download Hub</title>
    <link rel="manifest" href="manifest.json">
</head>
<body style="background:#0f172a; color:#fff; font-family:sans-serif; text-align:center; padding-top:100px;">

    <h1>Communication Hub</h1>
    <button id="btn" style="display:none; padding:15px; background:#10b981; color:#fff; border:none; border-radius:5px; font-size:16px; cursor:pointer;">📥 Download App</button>
    <p id="txt">Detecting compatibility...</p>

    <script>
        let deferPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferPrompt = e;
            document.getElementById('btn').style.display = 'inline-block';
            document.getElementById('txt').style.display = 'none';
        });

        document.getElementById('btn').addEventListener('click', () => {
            if(deferPrompt) deferPrompt.prompt();
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
